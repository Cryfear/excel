<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="shortcut icon" href="../favicon.ico">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet">
  <title>Excel</title>
</head>
<body>

<div id="app">
  <div class="header">
    <input placeholder="Новая таблица" class="header__input">
    <div class="header__icons-wrapper">
      <span class="material-icons">
        delete
      </span>
      <span class="material-icons">
        exit_to_app
      </span>
    </div>
  </div>

  <div class="toolbar">
    <span class="material-icons">
      format_align_left
    </span>
    <span class="material-icons">
      format_align_center
    </span>
    <span class="material-icons">
      format_align_right
    </span>
    <span class="material-icons">
      format_bold
    </span>
    <span class="material-icons">
      format_italic
    </span>
    <span class="material-icons">
      format_underline
    </span>
  </div>

  <div class="formula">
    <div class="formula__info">fx</div>
    <div class="formula__input" contenteditable="true" spellcheck="false"></div>
  </div>

  <div class="table">

    <div class="row">

      <div class="row-info"></div>

      <div class="row-data">
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>

        <div class="column">
          A
        </div>
        <div class="column">
          B
        </div>
      </div>

    </div>

    <div class="row">
      <div class="row-info">
        1
      </div>

      <div class="row-data">
        <div class="cell selected" contenteditable="">A1</div>
        <div class="cell" contenteditable="">B2</div>
      </div>
    </div>

    <div class="row">
      <div class="row-info">
        2
      </div>

      <div class="row-data">
        <div class="cell">A1</div>
        <div class="cell">B2</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
